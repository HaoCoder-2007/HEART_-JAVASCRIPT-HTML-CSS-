<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gửi người anh yêu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="wedding-style-wrap">
            <div class="date-background">18/01/2025</div>
            <div class="names-overlay">
                <span class="name-text">Huyền</span>
                <div class="heart-mini"></div>
                <span class="name-text">Hạo</span>
            </div>
        </div>

    <div class="message">
        <p id="random-note"></p>
        <div id="counter" class="counter-box">
            <p id="today-date"></p>
            <p id="live-clock"></p>
            <p>--------------------------------</p>
            <p id="in-love-time" style="font-weight: bold; color: #ff85a2;"></p>
            <p id="total-days" style="font-weight: bold; color: #ff85a2;"></p>
            <p id="special-wish" class="wish"></p>
        </div>
        <div class="gif-container">
            <!-- <img src="cat-pixel.gif" alt="cat-pixel" class="my-gif"> -->
            <img src="dog-pixel.gif" alt="dog-pixel" class="my-gif">
        </div>
    </div>

    
    <script src="script.js"></script>
</body>
</html>
