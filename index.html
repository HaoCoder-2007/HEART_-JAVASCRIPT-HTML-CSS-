<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gửi người anh yêu</title>
    <link rel="icon" type="image/png" href="https://oonydghpwdqrl4rm.public.blob.vercel-storage.com/picture/favicon/heart.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="leaf-container"></div>
    
    <canvas id="audio-visualizer" style="position: fixed; bottom: 0; left: 0; width: 100%; height: 150px; z-index: 0; pointer-events: none; opacity: 0.8;"></canvas>

    <div class="container">
        <div class="wedding-style-wrap">
            <div class="date-background">18/01/2025</div>
            <div class="names-overlay">
                <span class="name-text">Huyền</span>
                <div class="heart-mini"></div>
                <span class="name-text">Hạo</span>
            </div>
        </div>

    <div class="message">
        <p id="random-note"></p>
        <div id="counter" class="counter-box">
            <p id="today-date"></p>
            <p id="live-clock"></p>
            <p>--------------------------------</p>
            <p id="in-love-time" style="font-weight: bold; color: #ff85a2;"></p>
            <p id="total-days" style="font-weight: bold; color: #ff85a2;"></p>
            <p id="special-wish" class="wish"></p>
        </div>
        <div class="gif-container">
            <!-- <img src="https://oonydghpwdqrl4rm.public.blob.vercel-storage.com/picture/gif/cat-pixel.gif" alt="cat-pixel" class="my-gif" draggable="false"> -->
            <img src="https://oonydghpwdqrl4rm.public.blob.vercel-storage.com/picture/gif/dog-pixel.gif" alt="dog-pixel" class="my-gif" draggable="false">
        </div>

    <div class="spotify-player">
        <div class="track-info">
            <div class="scroll-container">
                <span id="track-name" class="track-name">Đang tải nhạc...</span>
            </div>
            
            <div class="seek-container">
                <span id="current-time">00:00</span>
                <input type="range" id="seek-bar" value="0" min="0" step="1">
                <span id="duration-time">00:00</span>
            </div>

            <div class="controls">
                <div class="volume-container">
                    <input type="range" id="volume-bar" value="100" min="0" max="100">
                </div>
                
                <button class="nav-btn" id="prevBtn">⬩➤</button>
                <button class="play-btn" id="playPauseBtn">▶︎</button>
                <button class="nav-btn" id="nextBtn">⬩➤</button>
            </div>
        </div>    
        <audio id="myAudio"></audio>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
